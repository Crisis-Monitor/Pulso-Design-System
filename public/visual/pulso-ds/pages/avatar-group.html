<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><title>Pulso DS — Avatar Group</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../globals.css">
<link rel="stylesheet" href="_page.css">
</head>
<body>
<div class="shell">
  <aside class="sb" id="sb"></aside>
  <main class="main">
    <div class="page-kicker">Molecules</div>
    <h1 class="page-title">Avatar Group</h1>
    <p class="page-sub">Agrupamento sobreposto. Mostra até 4 avatares; quantidade extra vira "+N" no último slot. Usado em listas de mentions, casos compartilhados, presença em tempo real.</p>
    <section class="section">
      <h2 class="section-h1">Default · sobreposição 8px</h2>
      <div class="preview-row" style="align-items:center;gap:24px;">
        <div style="display:flex;align-items:center;">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--muted);border:2px solid var(--card);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--fg-secondary);">NS</div>
          <div style="width:32px;height:32px;border-radius:50%;background:var(--muted);border:2px solid var(--card);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--fg-secondary);margin-left:-8px;">CR</div>
          <div style="width:32px;height:32px;border-radius:50%;background:var(--muted);border:2px solid var(--card);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--fg-secondary);margin-left:-8px;">MO</div>
          <div style="width:32px;height:32px;border-radius:50%;background:var(--primary-soft);border:2px solid var(--card);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--primary);margin-left:-8px;">+5</div>
        </div>
        <span style="font-size:13px;color:var(--fg-secondary);">Compartilhado com 8 pessoas</span>
      </div>
    </section>
    <section class="section">
      <h2 class="section-h1">Tamanhos</h2>
      <div class="preview-row" style="gap:32px;align-items:center;">
        <div style="display:flex;align-items:center;">
          <div style="width:24px;height:24px;border-radius:50%;background:var(--muted);border:2px solid var(--card);display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--fg-secondary);">A</div>
          <div style="width:24px;height:24px;border-radius:50%;background:var(--muted);border:2px solid var(--card);display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--fg-secondary);margin-left:-6px;">B</div>
          <div style="width:24px;height:24px;border-radius:50%;background:var(--muted);border:2px solid var(--card);display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--fg-secondary);margin-left:-6px;">+3</div>
        </div>
        <div style="display:flex;align-items:center;">
          <div style="width:40px;height:40px;border-radius:50%;background:var(--muted);border:2px solid var(--card);display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--fg-secondary);">A</div>
          <div style="width:40px;height:40px;border-radius:50%;background:var(--muted);border:2px solid var(--card);display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--fg-secondary);margin-left:-10px;">B</div>
          <div style="width:40px;height:40px;border-radius:50%;background:var(--primary-soft);border:2px solid var(--card);display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--primary);margin-left:-10px;">+12</div>
        </div>
      </div>
    </section>

    <div style="height: 80px;"></div>
  </main>
</div>
<script src="../_nav.js"></script>
</body>
</html>
