<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><title>Pulso DS — Avatar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../globals.css">
<link rel="stylesheet" href="_page.css">
</head>
<body>
<div class="shell">
  <aside class="sb" id="sb"></aside>
  <main class="main">
    <div class="page-kicker">Atoms</div>
    <h1 class="page-title">Avatar</h1>
    <p class="page-sub">Identidade visual de pessoa ou conta. 24, 32, 40 e 56px. Fallback com iniciais sobre fundo neutro — nunca tom de marca cheio.</p>
    <section class="section">
      <h2 class="section-h1">Tamanhos</h2>
      <div class="preview-row" style="gap:24px;align-items:center;">
        <div style="text-align:center;">
          <div style="width:24px;height:24px;border-radius:50%;background:var(--muted);color:var(--fg-secondary);display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;">NS</div>
          <div style="font-family:var(--font-pulso-mono);font-size:10px;color:var(--fg-muted);margin-top:6px;">24 · xs</div>
        </div>
        <div style="text-align:center;">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--muted);color:var(--fg-secondary);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;">NS</div>
          <div style="font-family:var(--font-pulso-mono);font-size:10px;color:var(--fg-muted);margin-top:6px;">32 · sm</div>
        </div>
        <div style="text-align:center;">
          <div style="width:40px;height:40px;border-radius:50%;background:var(--muted);color:var(--fg-secondary);display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;">NS</div>
          <div style="font-family:var(--font-pulso-mono);font-size:10px;color:var(--fg-muted);margin-top:6px;">40 · md (default)</div>
        </div>
        <div style="text-align:center;">
          <div style="width:56px;height:56px;border-radius:50%;background:var(--muted);color:var(--fg-secondary);display:inline-flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;">NS</div>
          <div style="font-family:var(--font-pulso-mono);font-size:10px;color:var(--fg-muted);margin-top:6px;">56 · lg</div>
        </div>
      </div>
    </section>
    <section class="section">
      <h2 class="section-h1">Estados</h2>
      <div class="preview-row" style="gap:16px;align-items:center;">
        <div style="position:relative;width:40px;height:40px;"><div style="width:40px;height:40px;border-radius:50%;background:var(--muted);color:var(--fg-secondary);display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;">NS</div><span style="position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;background:var(--success);border:2px solid var(--card);"></span></div>
        <div style="position:relative;width:40px;height:40px;"><div style="width:40px;height:40px;border-radius:50%;background:var(--muted);color:var(--fg-secondary);display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;">NS</div><span style="position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;background:var(--fg-subtle);border:2px solid var(--card);"></span></div>
        <div style="width:40px;height:40px;border-radius:50%;background:var(--primary-soft);color:var(--primary);display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;">CR</div>
        <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--chart-4),var(--chart-1));"></div>
      </div>
      <p class="section-desc" style="margin-top:12px;">Online / offline / agente IA / com imagem.</p>
    </section>

    <div style="height: 80px;"></div>
  </main>
</div>
<script src="../_nav.js"></script>
</body>
</html>
