<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><title>Pulso DS — Label</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../globals.css">
<link rel="stylesheet" href="_page.css">
</head>
<body>
<div class="shell">
  <aside class="sb" id="sb"></aside>
  <main class="main">
    <div class="page-kicker">Atoms</div>
    <h1 class="page-title">Label</h1>
    <p class="page-sub">Etiqueta de campo de formulário. 12px, weight 500, cor fg. Nunca uppercase em forms — uppercase é para kicker.</p>
    <section class="section">
      <h2 class="section-h1">Default</h2>
      <div class="preview-row" style="display:block;">
        <label style="display:block;font-size:12px;font-weight:500;color:var(--fg);margin-bottom:4px;">Email do operador</label>
        <input type="email" value="neviton@dotcase.com.br" style="width:100%;max-width:320px;padding:0 12px;height:32px;background:var(--card);border:1px solid var(--input);border-radius:var(--radius-sm);font-family:inherit;font-size:13px;color:var(--fg);">
      </div>
    </section>
    <section class="section">
      <h2 class="section-h1">Com indicador required</h2>
      <div class="preview-row" style="display:block;">
        <label style="display:block;font-size:12px;font-weight:500;color:var(--fg);margin-bottom:4px;">Nome do caso <span style="color:var(--destructive);font-weight:400;">*</span></label>
        <input type="text" placeholder="Ex: Operação Água Nova" style="width:100%;max-width:320px;padding:0 12px;height:32px;background:var(--card);border:1px solid var(--input);border-radius:var(--radius-sm);font-family:inherit;font-size:13px;color:var(--fg);">
      </div>
    </section>
    <section class="section">
      <h2 class="section-h1">Com hint</h2>
      <div class="preview-row" style="display:block;">
        <label style="display:block;font-size:12px;font-weight:500;color:var(--fg);">Threshold de alerta <span style="font-weight:400;color:var(--fg-muted);">— menções/hora</span></label>
        <div style="font-size:11px;color:var(--fg-muted);margin-top:2px;margin-bottom:4px;">Acima desse valor o caso entra em "atenção".</div>
        <input type="number" value="50" style="width:120px;padding:0 12px;height:32px;background:var(--card);border:1px solid var(--input);border-radius:var(--radius-sm);font-family:var(--font-pulso-mono);font-size:13px;color:var(--fg);">
      </div>
    </section>

    <div style="height: 80px;"></div>
  </main>
</div>
<script src="../_nav.js"></script>
</body>
</html>
