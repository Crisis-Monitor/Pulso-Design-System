name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Token consistency
        run: bun scripts/check-tokens.mjs --strict

      - name: Build static site
        run: bun run build

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --root-dir ${{ github.workspace }}/out --include-fragments out
          fail: true
